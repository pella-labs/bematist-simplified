name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-publish:
    name: build binaries + publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0
      - run: bun install --frozen-lockfile
      - name: compile 4 binaries
        run: bun run --cwd apps/ingest build:binary
      - name: generate sha256 sidecars
        working-directory: apps/ingest/dist
        run: |
          for f in bm-pilot-*; do
            sha256sum "$f" | awk '{print $1}' > "$f.sha256"
          done
          ls -la
      - name: publish github release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/ingest/dist/bm-pilot-darwin-arm64
            apps/ingest/dist/bm-pilot-darwin-arm64.sha256
            apps/ingest/dist/bm-pilot-darwin-x64
            apps/ingest/dist/bm-pilot-darwin-x64.sha256
            apps/ingest/dist/bm-pilot-linux-x64
            apps/ingest/dist/bm-pilot-linux-x64.sha256
            apps/ingest/dist/bm-pilot-win32-x64.exe
            apps/ingest/dist/bm-pilot-win32-x64.exe.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
